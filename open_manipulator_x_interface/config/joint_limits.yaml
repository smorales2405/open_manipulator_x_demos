# joint_limits.yaml — REFERENCIA / documentación.
#
# La fuente de verdad de los límites en tiempo de ejecución es
# open_manipulator_x_interface/config.py (JOINT_LIMITS). Este archivo solo
# documenta los valores actuales. Valores [rad].

joint_limits:
  joint1: {min: -1.5708, max: 1.5708}   # ±90°
  joint2: {min: -1.5708, max: 1.5708}   # ±90°  (supera el tope URDF ±85.9°)
  joint3: {min: -1.5708, max: 1.5708}   # ±90°  (supera el tope URDF +80.2°)
  joint4: {min: -1.5708, max: 1.5708}   # ±90°

gripper:
  # Apertura prismática [m] para RViz, y calibración del MOTOR medida con
  # Dynamixel Wizard en el robot real (ángulo absoluto del servo).
  prismatic: {closed: -0.010, open: 0.019}
  motor_deg: {closed: 40.0,  open: 160.0}
